spring.application.name=demo
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/sample_airbnb}
spring.data.mongodb.auto-index-creation=false

# Suppress noisy MongoDB connection errors when no local/remote MongoDB is available
logging.level.org.mongodb.driver.cluster=WARN
logging.level.org.mongodb.driver.connection=WARN
logging.level.com.mongodb=WARN